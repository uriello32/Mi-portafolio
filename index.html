<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
scroll-behavior:smooth;
}

body{
background:#f5f7fa;
}

header{
background:#192837;
color:white;
padding:15px;
position:fixed;
width:100%;
top:0;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
transition:0.3s;
}

nav a:hover{
color:#00b4d8;
}

.hero{
margin-top:70px;
height:500px;

background:linear-gradient(rgba(0, 0, 0, 0.912),
rgba(0,0,0,0.6)),
url("https://via.placeholder.com/1400");

background-size:cover;

color:white;

display:flex;
flex-direction:column;

justify-content:center;

align-items:center;

animation:fade 2s;

}

@keyframes fade{

from{opacity:0;}

to{opacity:1;}

}

.hero h1{

font-size:55px;

}

.hero p{

font-size:22px;

margin:15px;

}

button{

background:#00b4d8;

border:none;

padding:15px;

color:white;

border-radius:6px;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#0077b6;

transform:scale(1.05);

}

.section{

padding:60px 20px;

text-align:center;

}

.cards{

display:flex;

flex-wrap:wrap;

justify-content:center;

gap:25px;

}

.card{

background:white;

width:260px;

padding:25px;

border-radius:12px;

box-shadow:0 5px 20px rgba(0,0,0,0.1);

transition:0.4s;

}

.card:hover{

transform:translateY(-12px);

}

.gallery img{

width:300px;

margin:10px;

border-radius:10px;

transition:0.4s;

}

.gallery img:hover{

transform:scale(1.05);

}

form{

max-width:400px;

margin:auto;

display:flex;

flex-direction:column;

}

input, textarea{

margin:10px;

padding:10px;

border-radius:5px;

border:1px solid rgb(3, 3, 3);

}

footer{

background:#0a2540;

color:white;

padding:20px;

margin-top:40px;

}

.top{

position:fixed;

bottom:20px;

right:20px;

background:#00b4d8;

padding:10px;

border-radius:50%;

cursor:pointer;

}

@media(max-width:800px){

.hero h1{

font-size:35px;

}

.cards{

flex-direction:column;

align-items:center;

}

}

</style>

</head>

<body>

<header>

<nav>

<h2>MiPortfolio</h2>

<div>

<a href="#inicio">Inicio</a>

<a href="#sobre">Sobre mí</a>

<a href="#galeria">Galería</a>

<a href="#contacto">Contacto</a>

</div>

</nav>

</header>

<section class="hero" id="inicio">

<h1>Portafolio Web</h1>

<p>Uriel Lopez</p>

<button onclick="saludo()">Contratar</button>

</section>

<section class="section" id="sobre">

<h2>Sobre Mi</h2>

<p>Mi Nombre es Uriel Lopez, tengo 18 años y estudio en el Instituto Leibnitz, en Villa Maria Cordoba</p>


</section>

<section class="section" id="servicios">

<h2>Mas sobre mi</h2>

<div class="cards">

<div class="card">

<h3></h3>

<p>Uriel Lopez</p>

</div>

<div class="card">

<h3></h3>

<p>HTML y Pythom</p>

</div>

<div class="card">

<h3></h3>

<p>Leibnitz</p>

</div>

</div>

</section>

<section class="section" id="galeria">

<div class="gallery">

</div>

</section>

<section class="section" id="contacto">

<h2>Contacto</h2>

<form>

<input placeholder="Nombre">

<input placeholder="Email">

<textarea placeholder="Mensaje"></textarea>

<button>Enviar</button>

</form>

</section>

<footer>

<p>© 2026 Portfolio Web</p>

</footer>

<div class="top" onclick="subir()">

⬆

</div>

<script>

function saludo(){

alert("Gracias por tu interés");

}

function subir(){

window.scrollTo(0,0);

}

</script>

</body>

</html>
